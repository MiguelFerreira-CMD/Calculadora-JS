<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="calc.css">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Calculadora</title>
  
</head>
<body>
  <main class="calc">
    <div class="display" id="display">
      <div class="expression" id="expression"></div>
      <div class="result" id="result"></div>
    </div>

    <div class="keys">
      <button class="key" data-action="clear">C</button>
      <button class="key" data-action="back">←</button>
      <button class="key" data-value="(">(</button>
      <button class="key" data-value=")">)</button>

      <button class="key" data-value="7">7</button>
      <button class="key" data-value="8">8</button>
      <button class="key" data-value="9">9</button>
      <button class="key operator" data-value="/">÷</button>

      <button class="key" data-value="4">4</button>
      <button class="key" data-value="5">5</button>
      <button class="key" data-value="6">6</button>
      <button class="key operator" data-value="*">×</button>

      <button class="key" data-value="1">1</button>
      <button class="key" data-value="2">2</button>
      <button class="key" data-value="3">3</button>
      <button class="key operator" data-value="-">−</button>

      <button class="key wide" data-value="0">0</button>
      <button class="key" data-value=".">.</button>
      <button class="key operator" data-value="+">+</button>

      <button class="key equal" data-action="equal">=</button>
    </div>
  </main>

  <script src="calc.js"></script>
</body>
</html>
